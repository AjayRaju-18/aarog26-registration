<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAROG'26 - Medical Camp Registration</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AAROG'26</h1>
            <p class="subtitle">Patient Registration Form</p>
            <p class="organizer">Organized by YOUNG MINDS CLUB OF GCT YOUTH</p>
        </header>

        <form id="registrationForm">
            <div class="form-group">
                <label for="name">Patient Name *</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="age">Age *</label>
                <input type="number" id="age" name="age" min="1" max="120" required>
            </div>

            <div class="form-group">
                <label for="gender">Gender *</label>
                <select id="gender" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="mobile">Mobile Number *</label>
                <input type="tel" id="mobile" name="mobile" pattern="[0-9]{10}" placeholder="10-digit number" required>
            </div>

            <div class="form-group">
                <label for="address">Address *</label>
                <textarea id="address" name="address" rows="3" required></textarea>
            </div>

            <div class="form-group">
                <label for="reason">Reason to Visit *</label>
                <textarea id="reason" name="reason" rows="3" required></textarea>
            </div>

            <button type="submit" class="btn-submit">Register</button>
        </form>

        <div class="admin-section">
            <h3>Admin Actions</h3>
            <button onclick="downloadExcel()" class="btn-download">Download Excel</button>
            <button onclick="viewRegistrations()" class="btn-view">View Registrations</button>
            <button onclick="removeLastEntry()" class="btn-remove">Remove Last Entry</button>
        </div>

        <div id="registrationsList" class="registrations-list"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        // Replace this with your Google Apps Script Web App URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzEzeo7AWSaJXAyrndFg66R3_by7WC6JKjq-DtpjOXVdxx6foDiVbCWnC2unxxXnEm95w/exec';
    </script>
    <script src="script.js"></script>
</body>
</html>
